<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Email Spam Classifier</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrap">

    <!-- HEADER -->
    <div class="project-header">
      <div class="project-title">FINAL YEAR PROJECT (CMP 499)</div>

      <table class="project-table">
        <thead>
          <tr>
            <th>University</th>
            <th>Department</th>
            <th>Full Name</th>
            <th>Matric No</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Olabisi Onabanjo University</td>
            <td>Computer Sciences</td>
            <td>Olabintan Yusuf Olatunji</td>
            <td>SCI/22/23/0836</td>
          </tr>
        </tbody>
      </table>

      <div class="divider"></div>
    </div>

    <!-- CARD -->
    <div class="card">
      <h1>Email Spam Classifier</h1>

      <textarea id="emailText" placeholder="Paste the email content here..."></textarea>

      <div class="row">
        <button id="btnCheck">Check</button>
        <button class="secondary" id="btnHam">Random HAM</button>
        <button class="secondary" id="btnSpam">Random SPAM</button>
      </div>

      <div class="resultLine" id="resultLine">Result: —</div>
      <div class="barWrap">
        <div class="bar" id="confBar"></div>
      </div>

      <div class="err" id="errBox"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
