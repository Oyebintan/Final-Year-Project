<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Email Spam Classifier</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">🌙</button>

  <div class="wrap">

    <!-- HEADER -->
    <div class="project-header">
      <div class="project-title">FINAL YEAR PROJECT (CMP 499)</div>

      <div class="info-box">
        <div class="info-row">
          <span>Olabisi Onabanjo University</span>
          <span class="separator">|</span>
          <span>Department of Computer Sciences</span>
        </div>
        <div class="info-row">
          <span>Olabintan Yusuf Olatunji</span>
          <span class="separator">|</span>
          <span>SCI/22/23/0836</span>
        </div>
      </div>

      <div class="divider"></div>
    </div>

    <!-- CARD -->
    <div class="card">
      <h1>Email Spam Classifier</h1>

      <textarea id="emailText" placeholder="Paste the email content here..."></textarea>

      <div class="row">
        <button id="btnCheck">Check</button>
        <button class="secondary" id="btnHam">Random HAM</button>
        <button class="secondary" id="btnSpam">Random SPAM</button>
      </div>

      <div class="resultLine" id="resultLine">Result: —</div>
      <div class="barWrap">
        <div class="bar" id="confBar"></div>
      </div>

      <div class="err" id="errBox"></div>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    const toggleBtn = document.getElementById("themeToggle");
    const root = document.documentElement;

    // Load saved preference
    const saved = localStorage.getItem("theme") || "dark";
    root.setAttribute("data-theme", saved);
    toggleBtn.textContent = saved === "dark" ? "🌙" : "☀️";

    toggleBtn.addEventListener("click", () => {
      const current = root.getAttribute("data-theme");
      const next = current === "dark" ? "light" : "dark";
      root.setAttribute("data-theme", next);
      toggleBtn.textContent = next === "dark" ? "🌙" : "☀️";
      localStorage.setItem("theme", next);
    });
  </script>
</body>
</html>
